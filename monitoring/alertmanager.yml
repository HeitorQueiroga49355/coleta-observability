# ═══════════════════════════════════════════════════════════════════════════════
#  Alertmanager — roteamento de alertas para notificações reais
#
#  Credenciais via variáveis de ambiente (.env):
#    SMTP_HOST, SMTP_FROM, SMTP_USERNAME, SMTP_PASSWORD, ALERT_EMAIL_TO
#
#  Para Gmail, crie um App Password em:
#    https://myaccount.google.com/apppasswords
#
#  Requer flag --config.expand-env no Alertmanager (já configurado no compose).
# ═══════════════════════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  receiver: 'email'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      group_wait: 0s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'email'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']

receivers:
  - name: 'email'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          *Alerta:* {{ .Annotations.summary }}
          *Descrição:* {{ .Annotations.description }}
          *Severidade:* {{ .Labels.severity }}
          *Instância:* {{ .Labels.instance }}
          *Início:* {{ .StartsAt | humanizeTimestamp }}
          {{ end }}

  - name: 'email-critical'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[CRÍTICO] {{ .GroupLabels.alertname }} — ação imediata necessária'
        body: |
          ⚠ ALERTA CRÍTICO ⚠

          {{ range .Alerts }}
          *Alerta:* {{ .Annotations.summary }}
          *Descrição:* {{ .Annotations.description }}
          *Instância:* {{ .Labels.instance }}
          *Início:* {{ .StartsAt | humanizeTimestamp }}
          {{ end }}

          Acesse o Prometheus em http://localhost:9090/alerts para mais detalhes.

  # ── Outros canais (descomente e configure conforme necessário) ────────────────

