# ═══════════════════════════════════════════════════════════════════════════════
#  Regras de alerta — PostgreSQL, MongoDB e Frontend
#
#  Todos os alertas centralizados no hub coleta-observability.
#  Avaliados pelo Prometheus e roteados pelo Alertmanager.
# ═══════════════════════════════════════════════════════════════════════════════

groups:
  # ─── PostgreSQL (core — Coleta-Premiada) ────────────────────────────────────
  - name: coleta_premiada_postgres
    interval: 30s
    rules:

      # ── Conexões ─────────────────────────────────────────────────────────────
      - alert: PGConnectionsHigh
        expr: >
          sum(pg_stat_database_numbackends{datname!~"template.*|postgres"})
          / pg_settings_max_connections > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Conexões PostgreSQL acima de 80%"
          description: >
            Uso de conexões em {{ $value | humanizePercentage }} do limite
            max_connections ({{ $labels.instance }}).

      - alert: PGConnectionsCritical
        expr: >
          sum(pg_stat_database_numbackends{datname!~"template.*|postgres"})
          / pg_settings_max_connections > 0.95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Conexões PostgreSQL em nível crítico (95%+)"
          description: >
            {{ $value | humanizePercentage }} das conexões em uso.
            O banco está próximo de recusar novas conexões.

      # ── Queries longas ───────────────────────────────────────────────────────
      - alert: PGSlowQuery
        expr: pg_long_running_queries_count > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Queries lentas detectadas (> 5s)"
          description: >
            {{ $value }} queries ativas estão em execução há mais de 5 segundos
            em {{ $labels.instance }}.

      - alert: PGQueryVeryLong
        expr: pg_long_running_queries_count > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Múltiplas queries muito longas (> 5s)"
          description: >
            {{ $value }} queries ativas com mais de 5 segundos.
            Possível degradação de performance em {{ $labels.instance }}.

      # ── Idle in transaction ──────────────────────────────────────────────────
      - alert: PGIdleInTransaction
        expr: >
          sum(pg_stat_activity_count{state="idle in transaction"})
          > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Conexões idle in transaction acumuladas"
          description: >
            {{ $value }} conexões em estado 'idle in transaction'
            há mais de 5 minutos. Verifique transações não finalizadas.

      # ── Deadlocks ────────────────────────────────────────────────────────────
      - alert: PGDeadlocks
        expr: >
          rate(pg_stat_database_deadlocks{datname!~"template.*|postgres"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Deadlocks detectados no PostgreSQL"
          description: >
            Taxa de deadlocks: {{ $value | humanize }} deadlocks/segundo
            no banco {{ $labels.datname }}.

      # ── Locks não concedidos ─────────────────────────────────────────────────
      - alert: PGUnmatchedLocks
        expr: >
          sum(pg_locks_count{datname!~"template.*|postgres", mode=~"AccessExclusiveLock|RowExclusiveLock"})
          > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Locks exclusivos acumulados no PostgreSQL"
          description: >
            {{ $value }} locks exclusivos (AccessExclusive/RowExclusive)
            ativos em {{ $labels.instance }}. Possível contenção.

      # ── Cache hit ratio ──────────────────────────────────────────────────────
      - alert: PGLowCacheHitRatio
        expr: >
          (
            rate(pg_stat_database_blks_hit{datname!~"template.*|postgres"}[5m])
            /
            (rate(pg_stat_database_blks_hit{datname!~"template.*|postgres"}[5m])
             + rate(pg_stat_database_blks_read{datname!~"template.*|postgres"}[5m]))
          ) < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit ratio do PostgreSQL abaixo de 90%"
          description: >
            Cache hit ratio em {{ $value | humanizePercentage }}
            no banco {{ $labels.datname }}. Considere aumentar shared_buffers.

      # ── Replication lag ──────────────────────────────────────────────────────
      - alert: PGReplicationLag
        expr: >
          pg_stat_replication_replay_lag_seconds > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Lag de replicação acima de 30 segundos"
          description: >
            Réplica {{ $labels.application_name }} está {{ $value }}s atrás
            do primário.

      - alert: PGReplicationLagCritical
        expr: >
          pg_stat_replication_replay_lag_seconds > 300
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Lag de replicação crítico (> 5 min)"
          description: >
            Réplica {{ $labels.application_name }} está {{ $value }}s atrás.
            Risco de perda de dados em caso de failover.

  # ─── MongoDB (cp-collection-ms) ─────────────────────────────────────────────
  - name: coleta_premiada_mongodb
    interval: 30s
    rules:

      - alert: MongoDBDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB (cp-collection-ms) está DOWN"
          description: >
            O exporter não consegue conectar ao MongoDB em {{ $labels.instance }}.
            Verifique imediatamente o serviço ms-db.

      - alert: MongoDBConnectionsHigh
        expr: >
          mongodb_connections{state="current"}
          / mongodb_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB com mais de 80% de conexões em uso"
          description: >
            {{ $value | humanizePercentage }} das conexões disponíveis
            estão em uso ({{ $labels.instance }}).

      - alert: MongoDBConnectionsCritical
        expr: >
          mongodb_connections{state="current"}
          / mongodb_connections_max > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB com mais de 95% de conexões em uso"
          description: >
            {{ $value | humanizePercentage }} das conexões em uso.

      - alert: MongoDBReplicationLag
        expr: >
          mongodb_mongod_replset_member_replication_lag{member_state="PRIMARY"}
          > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Lag de replicação do MongoDB acima de 30s"
          description: >
            Réplica {{ $labels.name }} está {{ $value }}s atrás do primário.

      - alert: MongoDBReplicationLagCritical
        expr: >
          mongodb_mongod_replset_member_replication_lag{member_state="PRIMARY"}
          > 300
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Lag de replicação do MongoDB crítico (> 5 min)"
          description: >
            Réplica {{ $labels.name }} está {{ $value }}s atrás.

      - alert: MongoDBReplicaHealth
        expr: mongodb_mongod_replset_member_health < 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Membro do replica set MongoDB indisponível"
          description: >
            Membro {{ $labels.name }} do replica set com health = {{ $value }}.

      - alert: MongoDBQueueLong
        expr: >
          mongodb_mongod_global_lock_current_queue{type="total"}
          > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Fila de locks globais do MongoDB com mais de 10 operações"
          description: >
            {{ $value }} operações aguardando na fila de lock global.

      - alert: MongoDBSlowOperations
        expr: >
          rate(mongodb_mongod_metrics_operation_slow_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB com taxa elevada de operações lentas"
          description: >
            {{ $value | humanize }}/s operações excedendo slow-ms threshold.

      - alert: MongoDBWiredTigerCachePressure
        expr: >
          mongodb_mongod_wiredtiger_cache_bytes
          / mongodb_mongod_wiredtiger_cache_max_bytes > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache WiredTiger do MongoDB com alta pressão (> 90%)"
          description: >
            {{ $value | humanizePercentage }} do cache WiredTiger em uso.

      - alert: MongoDBOpenCursorsHigh
        expr: mongodb_mongod_metrics_cursor_open_total > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB com mais de 1000 cursores abertos"
          description: >
            {{ $value }} cursores abertos em {{ $labels.instance }}.

      - alert: MongoDBAssertsWarning
        expr: >
          rate(mongodb_mongod_metrics_asserts_warning_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB gerando warns de assert"
          description: >
            {{ $value | humanize }}/s asserts de warning.
            Verifique os logs do MongoDB.

  # ─── Infraestrutura / Sistema ────────────────────────────────────────────────
  - name: coleta_premiada_infra
    interval: 30s
    rules:

      - alert: DiskSpaceHigh
        expr: >
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Uso de disco acima de 80%"
          description: >
            Sistema de arquivos {{ $labels.mountpoint }} com
            {{ $value | humanizePercentage }} de uso.

      - alert: DiskSpacePredictFull
        expr: >
          predict_linear(
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[1h], 24 * 3600
          ) < 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disco deve encher em ~24h (previsão)"
          description: >
            No ritmo atual, {{ $labels.mountpoint }} ficará sem espaço
            em aproximadamente 24 horas.

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Serviço {{ $labels.job }} está DOWN"
          description: >
            O target {{ $labels.instance }} (job: {{ $labels.job }})
            não está respondendo há mais de 2 minutos.

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  - name: coleta_premiada_rabbitmq
    interval: 30s
    rules:

      - alert: RabbitMQQueueHigh
        expr: rabbitmq_queue_messages_ready > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Fila RabbitMQ com mais de 1000 mensagens pendentes"
          description: >
            A fila {{ $labels.queue }} tem {{ $value }} mensagens
            aguardando processamento.

      - alert: RabbitMQNoConsumers
        expr: rabbitmq_queue_consumers == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Fila RabbitMQ sem consumidores"
          description: >
            A fila {{ $labels.queue }} não tem nenhum consumidor ativo.
            Mensagens serão acumuladas indefinidamente.

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  - name: coleta_premiada_frontend
    interval: 30s
    rules:

      - alert: FrontendDown
        expr: up{job="nextjs-frontend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Frontend (Next.js) está DOWN"
          description: >
            O endpoint /metrics do frontend não está respondendo.

      - alert: Frontend5xxRate
        expr: >
          sum(rate(nextjs_http_requests_total{status=~"5.."}[5m]))
          / sum(rate(nextjs_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taxa de erros 5xx no frontend acima de 5%"
          description: >
            {{ $value | humanizePercentage }} das requisições estão retornando
            erro 5xx nos últimos 5 minutos.

      - alert: FrontendHighMemory
        expr: >
          container_memory_working_set_bytes{
            container_label_com_docker_compose_service="frontend"
          } > 1073741824
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frontend consumindo mais de 1 GB de memória"
          description: >
            Container frontend usando {{ $value | humanize }}B de memória.
